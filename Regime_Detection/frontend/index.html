<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Regime Dashboard</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white font-sans">

  <div class="p-6">

    <!-- Header -->
    <h1 class="text-3xl font-bold mb-6">Quant Regime Engine</h1>

    <!-- Regime Card -->
    <div id="regime-card" class="p-6 rounded-2xl text-center text-4xl font-bold">
      Loading...
    </div>

    <!-- Metrics -->
    <div class="grid grid-cols-3 gap-4 mt-6">
      <div class="bg-gray-900 p-4 rounded-xl">
        <p class="text-gray-400">21D Return</p>
        <p id="ret" class="text-xl"></p>
      </div>

      <div class="bg-gray-900 p-4 rounded-xl">
        <p class="text-gray-400">Vol Ratio</p>
        <p id="vol" class="text-xl"></p>
      </div>

      <div class="bg-gray-900 p-4 rounded-xl">
        <p class="text-gray-400">Price</p>
        <p id="price" class="text-xl"></p>
      </div>
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
